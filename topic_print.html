<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Academy Pro | Навчальний Портал</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* --- ТЕМА (Cyberpunk/Dark Modern) --- */
            --bg: #0b1120;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #0ea5e9;       /* Яскраво-блакитний */
            --accent: #8b5cf6;        /* Фіолетовий неон */
            --success: #22c55e;       /* Зелений */
            --error: #ef4444;         /* Червоний */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --code-bg: #020617;
            --glow: 0 0 20px rgba(14, 165, 233, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
        }

        .logo-area {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1), transparent);
        }
        .logo-area h2 {
            font-weight: 800; font-size: 20px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 10px;
        }

        /* ПРОФІЛЬ ГРАВЦЯ В САЙДБАРІ */
        .user-profile {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }
        .user-level { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .xp-bar-container { width: 100%; height: 6px; background: #334155; border-radius: 10px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1s ease; }
        .user-stats { font-size: 14px; font-weight: 600; margin-top: 5px; color: #e2e8f0; }

        .nav-list { flex: 1; overflow-y: auto; padding: 20px 12px; }
        
        .nav-btn {
            width: 100%; text-align: left; padding: 12px 16px;
            margin-bottom: 4px; border-radius: 8px; border: none; background: transparent;
            cursor: pointer; color: var(--text-dim); font-size: 14px; font-weight: 600;
            transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-btn:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-btn.active { background: rgba(14, 165, 233, 0.15); color: var(--primary); border-left: 3px solid var(--primary); }
        .nav-btn.completed .check-icon { opacity: 1; color: var(--success); }
        .check-icon { opacity: 0; font-size: 16px; transition: 0.3s; }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }

        /* --- MAIN AREA --- */
        .main { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

        /* DASHBOARD VIEW */
        .dashboard-view { padding: 40px; overflow-y: auto; height: 100%; display: none; }
        .dashboard-view.active { display: block; animation: fadeIn 0.4s; }

        .hero-banner {
            text-align: center; margin-bottom: 50px; padding: 60px 0;
            background: radial-gradient(circle at center, rgba(14, 165, 233, 0.1) 0%, transparent 70%);
        }
        .hero-banner h1 { font-size: 48px; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }
        .hero-banner span { color: var(--primary); }
        .typewriter { color: var(--text-dim); font-size: 20px; min-height: 30px; }

        /* Stats Row */
        .stats-overview {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: var(--surface); padding: 15px 30px; border-radius: 12px; border: 1px solid var(--border);
            text-align: center; min-width: 150px;
        }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--text-main); }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; max-width: 1100px; margin: 0 auto; }

        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 24px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-7px); border-color: var(--primary); box-shadow: var(--glow); }
        .card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .card.completed { border-color: var(--success); background: linear-gradient(145deg, var(--surface), rgba(34, 197, 94, 0.05)); }
        .card-icon { font-size: 32px; margin-bottom: 15px; background: rgba(255,255,255,0.05); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        
        /* LESSON VIEW */
        .lesson-view { display: none; height: 100%; flex-direction: column; padding: 20px; overflow-y: auto; }
        .lesson-view.active { display: flex; animation: slideIn 0.3s; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { background: var(--surface); color: var(--text-main); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-size: 14px; transition: 0.2s; }
        .back-btn:hover { background: var(--surface-hover); }

        .split-container { display: grid; grid-template-columns: 35% 65%; gap: 20px; flex: 1; min-height: 0; }

        .theory-col { overflow-y: auto; padding-right: 10px; }
        .theory-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        .theory-title { color: var(--primary); font-size: 18px; margin-bottom: 15px; font-weight: 700; }
        .code-snippet { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; font-family: 'Fira Code', monospace; color: #e2e8f0; font-size: 0.9em; margin: 10px 0; border-left: 3px solid var(--accent); }
        .task-desc { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

        /* EDITOR */
        .editor-container { display: flex; flex-direction: column; gap: 10px; }
        .code-editor-wrapper { flex: 2; background: var(--code-bg); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .editor-header { padding: 8px 16px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; }
        textarea#codeEditor { flex: 1; background: transparent; border: none; color: #e2e8f0; padding: 20px; font-family: 'Fira Code', monospace; font-size: 15px; line-height: 1.6; resize: none; outline: none; caret-color: var(--primary); }

        .terminal-wrapper { flex: 1; background: #000; border-radius: 12px; border: 1px solid var(--border); padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px; overflow-y: auto; color: var(--text-dim); }
        .output-success { color: var(--success); }
        .output-error { color: var(--error); }

        .action-bar { display: flex; justify-content: space-between; align-items: center; }
        .hint-btn { background: transparent; color: var(--text-dim); border: none; cursor: pointer; text-decoration: underline; }
        .buttons-group { display: flex; gap: 12px; }
        
        .btn { padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-run { background: var(--primary); color: #000; }
        .btn-run:hover { background: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .btn-next { background: var(--success); color: #000; opacity: 0.5; pointer-events: none; }
        .btn-next.unlocked { opacity: 1; pointer-events: auto; animation: pulse 2s infinite; }

        .hint-popup { margin-top: 10px; background: rgba(253, 224, 71, 0.1); color: #fde047; padding: 10px; border-radius: 6px; display: none; border: 1px solid rgba(253, 224, 71, 0.2); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; }
            .nav-list { display: none; }
            .split-container { grid-template-columns: 1fr; }
            .editor-container { height: 600px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <h2>🚀 Python <span style="color:var(--text-main)">Pro</span></h2>
        </div>
        
        <div class="user-profile">
            <div class="user-level">
                <span id="levelLabel">Level 1</span>
                <span id="xpLabel">0 XP</span>
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar-fill" id="xpFill"></div>
            </div>
            <div class="user-stats" id="tasksCompletedLabel">0 / 9 Завдань</div>
        </div>

        <div class="nav-list" id="navList">
            </div>
        <div class="sidebar-footer">
            <button class="nav-btn" onclick="showDashboard()">
                <span>🏠 Головна</span>
            </button>
            <button class="nav-btn" onclick="openPlayground()">
                <span>🎡 Пісочниця</span>
            </button>
        </div>
    </div>

    <div class="main">
        
        <div id="dashboardView" class="dashboard-view active">
            <div class="hero-banner">
                <h1>Вивчи Python <span>інтерактивно</span></h1>
                <div class="typewriter" id="typewriter"></div>
            </div>

            <div class="stats-overview">
                <div class="stat-card">
                    <div class="stat-val" id="totalXpVal">0</div>
                    <div class="stat-label">Total XP</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="streakVal">1 🔥</div>
                    <div class="stat-label">Day Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val">Beginner</div>
                    <div class="stat-label">Rank</div>
                </div>
            </div>

            <h3 style="margin-bottom: 20px; text-align: center; color: var(--text-dim);">Твій шлях навчання</h3>
            <div class="cards-grid" id="cardsGrid">
                </div>
        </div>

        <div id="lessonView" class="lesson-view">
            <div class="top-bar">
                <button class="back-btn" onclick="showDashboard()">← Назад</button>
                <div style="font-weight:bold; color: var(--text-dim)" id="currentTaskTitle">Урок 1</div>
            </div>

            <div class="split-container">
                <div class="theory-col">
                    <div class="theory-box">
                        <div id="theoryContent"></div>
                        <div class="task-desc">
                            <h4 style="margin-bottom:10px; color:var(--text-main)">🎯 Твоє завдання:</h4>
                            <p id="taskDescription" style="color:var(--text-dim); line-height:1.5"></p>
                            <button class="hint-btn" onclick="toggleHint()" style="margin-top:10px">💡 Підказка</button>
                            <div id="hintBox" class="hint-popup"></div>
                        </div>
                    </div>
                </div>

                <div class="editor-container">
                    <div class="code-editor-wrapper">
                        <div class="editor-header">
                            <span>main.py</span>
                            <span>Python 3.10 Simulator</span>
                        </div>
                        <textarea id="codeEditor" spellcheck="false" placeholder="# Пиши свій код тут..."></textarea>
                    </div>

                    <div class="terminal-wrapper" id="terminal">
                        <div class="output-system">>>> Ready to code...</div>
                    </div>

                    <div class="action-bar">
                        <div style="font-size:12px; color:var(--text-dim)">Status: <span id="statusText">Waiting</span></div>
                        <div class="buttons-group">
                            <button class="btn btn-run" onclick="runCode()">▶ RUN</button>
                            <button class="btn btn-next" id="nextBtn" onclick="nextTask()">NEXT ➡</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

<script>
    // --- ДАНІ (ТВОЇ ЗАДАЧІ) ---
    const tasks = [
        {
            id: 0,
            title: "Перше слово",
            icon: "📢",
            desc: "Напиши код, який виведе на екран фразу: <b>Привіт, світ!</b>",
            hint: "print(\"Привіт, світ!\")",
            theory: `
                <div class="theory-title">📚 Що таке print()?</div>
                <p>Уявіть, що Python — це робот. Щоб змусити його щось сказати, ми використовуємо команду <code>print()</code>.</p>
                <div class="code-snippet">print("Текст")</div>
                <p>Важливо: Текст завжди має бути в лапках!</p>
            `,
            check: (c, o) => o.includes("Привіт, світ!") || o.includes("Привіт світ")
        },
        {
            id: 1,
            title: "Новий рядок",
            icon: "⬇",
            desc: "Виведи цифри <b>1, 2, 3</b> (кожну з нового рядка).",
            hint: "Напиши три команди print.",
            theory: `
                <div class="theory-title">⬇ Порядок виконання</div>
                <p>Комп'ютер читає код зверху вниз. Кожен <code>print</code> створює новий рядок.</p>
                <div class="code-snippet">print("1")<br>print("2")</div>
            `,
            check: (c, o) => (c.match(/print/g) || []).length >= 3 && o.includes("1") && o.includes("3")
        },
        {
            id: 2,
            title: "Математика",
            icon: "🧮",
            desc: "Нехай Python порахує суму <b>5 + 10</b>. Пиши без лапок.",
            hint: "print(5 + 10)",
            theory: `
                <div class="theory-title">🧮 Числа</div>
                <p>Якщо написати приклад у дужках <strong>без лапок</strong>, Python порахує його.</p>
                <div class="code-snippet">print(5+5) -> 10</div>
            `,
            check: (c, o) => c.includes("5") && c.includes("10") && o.includes("15") && !c.includes('"')
        },
        {
            id: 3,
            title: "Кома",
            icon: "🔗",
            desc: "Надрукуй <b>'Сума:', 20</b> через кому.",
            hint: "print(\"Сума:\", 20)",
            theory: `
                <div class="theory-title">🔗 Склеювання</div>
                <p><code>print()</code> може приймати багато аргументів через кому.</p>
                <div class="code-snippet">print("А", "Б") -> А Б</div>
            `,
            check: (c, o) => c.includes(",") && o.includes("Сума: 20")
        },
        {
            id: 4,
            title: "Розділювач (sep)",
            icon: "✂",
            desc: "Виведи <b>1, 2, 3</b> через дефіс за допомогою sep.",
            hint: "sep=\"-\"",
            theory: `
                <div class="theory-title">✂ Магія sep</div>
                <p>Змінюємо пробіл на інший символ через <code>sep</code>.</p>
                <div class="code-snippet">print(1, 2, sep="-") -> 1-2</div>
            `,
            check: (c, o) => c.includes("sep") && o.includes("1-2-3")
        },
        {
            id: 5,
            title: "Кінець (end)",
            icon: "🛑",
            desc: "Напиши два print ('Hello' і 'World'), але склей їх в один рядок.",
            hint: "end=\" \"",
            theory: `
                <div class="theory-title">🛑 Магія end</div>
                <p>Щоб курсор не стрибав на новий рядок, використовуй <code>end</code>.</p>
                <div class="code-snippet">print("A", end="")<br>print("B") -> AB</div>
            `,
            check: (c, o) => c.includes("end=") && o.includes("Hello World")
        },
        {
            id: 6,
            title: "Текст + Число",
            icon: "🧩",
            desc: "Виведи: <b>2 + 2 = 4</b> (де 4 — це формула).",
            hint: "print(\"2 + 2 =\", 2 + 2)",
            theory: `
                <div class="theory-title">🧩 Мікс</div>
                <p>Можна поєднувати текст і формули.</p>
                <div class="code-snippet">print("Рік:", 2024)</div>
            `,
            check: (c, o) => o.includes("2 + 2 = 4")
        },
        {
            id: 7,
            title: "Багато рядків",
            icon: "📄",
            desc: "Напиши два рядки тексту в одному print (потрійні лапки).",
            hint: "\"\"\"",
            theory: `
                <div class="theory-title">📄 Потрійні лапки</div>
                <div class="code-snippet">print("""Рядок 1<br>Рядок 2""")</div>
            `,
            check: (c, o) => (c.includes('"""') || c.includes("'''")) && o.length > 5
        },
        {
            id: 8,
            title: "🏆 ФІНАЛ",
            icon: "🎓",
            desc: "Виведи 3 рядки: 1) Смайл, 2) Число 100, 3) Список продуктів.",
            hint: "Три різних print.",
            theory: `<div class="theory-title">🎓 Іспит</div><p>Використовуй все, що вивчив!</p>`,
            check: (c, o) => (o.match(/\n/g) || []).length >= 2 || o.length > 15
        }
    ];

    // --- STATE ---
    let currentTaskIdx = 0;
    let userState = JSON.parse(localStorage.getItem('py_pro_state')) || { 
        xp: 0, 
        level: 1, 
        completed: [] 
    };

    // --- INIT ---
    function init() {
        renderDashboard();
        renderNav();
        updateStats();
        typeWriterEffect();
        
        // Tab key support
        document.getElementById('codeEditor').addEventListener('keydown', function(e) {
            if (e.key == 'Tab') {
                e.preventDefault();
                var s = this.selectionStart;
                this.value = this.value.substring(0, s) + "    " + this.value.substring(this.selectionEnd);
                this.selectionEnd = s + 4;
            }
        });
    }

    // --- TYPING EFFECT ---
    const typeTexts = ["Навчись кодувати.", "Створюй майбутнє.", "Python - це просто.", "Стань професіоналом."];
    let typeIdx = 0;
    let charIdx = 0;
    function typeWriterEffect() {
        const el = document.getElementById('typewriter');
        if (!el) return;
        const currentText = typeTexts[typeIdx];
        
        if (charIdx < currentText.length) {
            el.innerHTML += currentText.charAt(charIdx);
            charIdx++;
            setTimeout(typeWriterEffect, 100);
        } else {
            setTimeout(() => {
                el.innerHTML = "";
                charIdx = 0;
                typeIdx = (typeIdx + 1) % typeTexts.length;
                typeWriterEffect();
            }, 2000);
        }
    }

    // --- NAVIGATION ---
    function showDashboard() {
        document.getElementById('lessonView').classList.remove('active');
        document.getElementById('dashboardView').classList.add('active');
        renderDashboard();
        renderNav();
        updateStats();
    }

    function openTask(idx) {
        currentTaskIdx = idx;
        const task = tasks[idx];
        
        document.getElementById('dashboardView').classList.remove('active');
        document.getElementById('lessonView').classList.add('active');
        
        document.getElementById('currentTaskTitle').innerText = `${task.icon} ${task.title}`;
        document.getElementById('theoryContent').innerHTML = task.theory;
        document.getElementById('taskDescription').innerHTML = task.desc;
        document.getElementById('hintBox').style.display = 'none';
        document.getElementById('hintBox').innerText = task.hint;
        
        document.getElementById('codeEditor').value = "";
        document.getElementById('terminal').innerHTML = '<div class="output-system">>>> Ready...</div>';
        document.getElementById('nextBtn').classList.remove('unlocked');
        document.getElementById('statusText').innerText = "Waiting";
        document.getElementById('statusText').style.color = "var(--text-dim)";
    }

    function openPlayground() {
        currentTaskIdx = -1; // Sandbox mode
        document.getElementById('dashboardView').classList.remove('active');
        document.getElementById('lessonView').classList.add('active');
        
        document.getElementById('currentTaskTitle').innerText = "🎡 Пісочниця";
        document.getElementById('theoryContent').innerHTML = `<div class="theory-title">Вільний код</div><p>Тут ти можеш писати будь-що. Експериментуй!</p>`;
        document.getElementById('taskDescription').innerHTML = "Немає завдань. Просто кодуй.";
        document.querySelector('.task-desc').style.display = 'none';
        
        document.getElementById('codeEditor').value = "print('Hello, Playground!')";
        document.getElementById('nextBtn').classList.remove('unlocked');
    }

    // --- LOGIC ---
    function runCode() {
        const code = document.getElementById('codeEditor').value;
        const terminal = document.getElementById('terminal');
        const isSandbox = currentTaskIdx === -1;
        
        terminal.innerHTML = "";
        let fullOutput = "";
        let hasError = false;

        // Simulator
        const lines = code.split('\n');
        lines.forEach(line => {
            line = line.trim();
            if(!line || line.startsWith("#")) return;

            if(line.startsWith("print")) {
                try {
                    let content = line.slice(line.indexOf('(') + 1, line.lastIndexOf(')'));
                    // Basic parser for demonstration
                    let parts = content.split(/,(?=(?:(?:[^"']*["|']){2})*[^"']*$)/);
                    let out = [];
                    let sep = " ";
                    
                    parts.forEach(p => {
                        p = p.trim();
                        if(p.includes("sep=")) sep = p.split("=")[1].replace(/['"]/g, "");
                        else if(!p.includes("end=")) {
                            if((p.startsWith('"') || p.startsWith("'"))) out.push(p.replace(/['"]+/g, ''));
                            else try { out.push(eval(p)); } catch(e) { out.push(p); }
                        }
                    });
                    let res = out.join(sep);
                    terminal.innerHTML += `<div>${res}</div>`;
                    fullOutput += res + "\n";
                } catch(e) {
                    terminal.innerHTML += `<div class="output-error">Syntax Error</div>`;
                    hasError = true;
                }
            } else if (line.includes("=")) {
                try { eval(line); } catch(e) {}
            }
        });

        // Sandbox check
        if(isSandbox) {
            terminal.innerHTML += `<div class="output-system">>>> Code executed.</div>`;
            return;
        }

        // Task check
        const task = tasks[currentTaskIdx];
        if(!hasError && task.check(code, fullOutput)) {
            terminal.innerHTML += `<div class="output-success" style="margin-top:10px">✨ SUCCESS! +100 XP</div>`;
            playAudio("success");
            
            if (!userState.completed.includes(currentTaskIdx)) {
                userState.completed.push(currentTaskIdx);
                userState.xp += 100;
                if(userState.xp >= userState.level * 500) userState.level++;
                localStorage.setItem('py_pro_state', JSON.stringify(userState));
                updateStats();
            }
            
            document.getElementById('nextBtn').classList.add('unlocked');
            if (currentTaskIdx === tasks.length - 1) fireConfetti();
        } else {
            terminal.innerHTML += `<div class="output-error" style="margin-top:10px">❌ Try again.</div>`;
        }
    }

    // --- UI UPDATES ---
    function updateStats() {
        const completedCount = userState.completed.length;
        document.getElementById('levelLabel').innerText = `Level ${userState.level}`;
        document.getElementById('xpLabel').innerText = `${userState.xp} XP`;
        document.getElementById('tasksCompletedLabel').innerText = `${completedCount} / ${tasks.length} Завдань`;
        document.getElementById('totalXpVal').innerText = userState.xp;
        
        // Calculate Bar
        const xpForNextLevel = userState.level * 500;
        const currentLevelXp = userState.xp - ((userState.level - 1) * 500);
        const percent = (currentLevelXp / 500) * 100;
        document.getElementById('xpFill').style.width = `${Math.min(percent, 100)}%`;
    }

    function renderDashboard() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = tasks.map((t, i) => {
            const isDone = userState.completed.includes(i);
            const isLocked = i > 0 && !userState.completed.includes(i - 1);
            let cls = "card";
            if(isDone) cls += " completed";
            else if(isLocked) cls += " locked";
            
            return `
            <div class="${cls}" onclick="${!isLocked || isDone ? `openTask(${i})` : ''}">
                <div class="card-icon">${t.icon}</div>
                <h3 style="margin-bottom:5px; color:var(--text-main)">${t.title}</h3>
                <p style="font-size:13px; color:var(--text-dim)">Рівень ${i+1}</p>
                ${isDone ? '<div style="position:absolute; top:15px; right:15px; color:var(--success)">✓</div>' : ''}
            </div>
            `;
        }).join('');
    }

    function renderNav() {
        const list = document.getElementById('navList');
        list.innerHTML = tasks.map((t, i) => {
            const isDone = userState.completed.includes(i);
            return `<button class="nav-btn ${isDone ? 'completed' : ''}" onclick="openTask(${i})">
                <span>${i+1}. ${t.title}</span><span class="check-icon">✓</span>
            </button>`;
        }).join('');
    }

    function toggleHint() {
        const h = document.getElementById('hintBox');
        h.style.display = h.style.display === 'block' ? 'none' : 'block';
    }

    function nextTask() {
        if(currentTaskIdx < tasks.length - 1) openTask(currentTaskIdx + 1);
        else { showDashboard(); fireConfetti(); }
    }

    // Simple Audio Synth (No files needed)
    function playAudio(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        if (type === "success") {
            osc.type = "sine";
            osc.frequency.setValueAtTime(500, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        }
    }

    function fireConfetti() {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }

    init();
</script>
</body>
</html>
